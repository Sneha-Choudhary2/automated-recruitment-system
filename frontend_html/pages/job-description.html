<div class="jd-page">
    <div class="jd-header">
        <h1>Job Description</h1>
        <p>Create and manage job descriptions for candidate matching</p>
    </div>

    <div class="jd-grid">
        <div class="jd-card">
            <h3>New Job Description</h3>

            <div id="editModeBanner" class="edit-banner" style="display:none;">
                Editing Mode
                <button type="button" id="cancelEditBtn">Cancel</button>
            </div>

            <form id="jobForm" onsubmit="return false;">
                <div class="form-group">
                    <label>Job Title *</label>
                    <input type="text" id="jobTitle" required>
                </div>

                <div class="form-group">
                    <label>Job Description *</label>
                    <textarea id="jobRawText" required></textarea>
                </div>

                <div class="form-group">
                    <label>Application Deadline</label>
                    <input type="date" id="jobDeadline">
                </div>

                <button type="button" class="jd-save-btn" id="saveJobBtn">
                    Save Job Description
                </button>
            </form>
        </div>

        <div class="jd-card">
            <h3>Saved Jobs</h3>
            <p id="jobCount">0 job(s) created</p>
            <div id="savedJobsList"></div>
        </div>
    </div>
</div>
